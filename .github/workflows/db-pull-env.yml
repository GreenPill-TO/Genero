name: Supabase Pull Drift (TCOIN env → repo)

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: Which environment to diff?
        default: PREVIEW
        options: [PREVIEW, PRODUCTION]

jobs:
  pull-remote-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      - name: Ensure migrations folder
        run: |
          mkdir -p supabase/migrations
          ls -la supabase/migrations || true

      - name: Build DB URL for selected env
        id: makeurl
        env:
          INPUT_TARGET: ${{ github.event.inputs.target }}
          PREVIEW_DB_URL: ${{ secrets.SUPABASE_SESSION_POOLER_TCOIN_PREVIEW }}
          PRODUCTION_DB_URL: ${{ secrets.SUPABASE_SESSION_POOLER_TCOIN_PRODUCTION }}
        run: |
          set -e
          case "$INPUT_TARGET" in
            PRODUCTION)
              echo "DB_URL=$PRODUCTION_DB_URL" >> "$GITHUB_OUTPUT"
              echo "BASE_BRANCH=main" >> "$GITHUB_OUTPUT"
              ;;
            PREVIEW|*)
              echo "DB_URL=$PREVIEW_DB_URL" >> "$GITHUB_OUTPUT"
              echo "BASE_BRANCH=dev" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "Using session pooler connection string for $INPUT_TARGET (value hidden)"

      - name: Generate drift migration
        id: diff
        env:
          DB_URL: ${{ steps.makeurl.outputs.DB_URL }}
        run: |
          set -e
          ts=$(date -u +"%Y%m%d%H%M%S")
          out="supabase/migrations/${ts}_remote_drift.sql"
      
          echo "Diffing LIVE (migra) → $out"
          supabase db diff \
            --db-url "$DB_URL" \
            --schema public \
            --schema storage \
            --schema auth \
            -f "$out" || true
      
          if [ ! -s "$out" ]; then
            echo "migra produced empty diff; retrying with pg-schema-diff…"
            supabase db diff \
              --db-url "$DB_URL" \
              --schema public \
              --schema storage \
              --schema auth \
              --use-pg-schema \
              -f "$out" || true
          fi
      
          echo "----- migrations after diff -----"
          ls -la supabase/migrations || true
      
          if [ -f "$out" ]; then
            echo "size=$(wc -c < "$out") bytes"
            head -n 50 "$out" || true
          fi
      
          if [ -s "$out" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "file=$out" >> "$GITHUB_OUTPUT"
          else
            rm -f "$out"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected (or empty diff)."
          fi

      - name: Upload candidate migration (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-pull-output
          path: supabase/migrations/*_remote_drift.sql
          if-no-files-found: ignore
    
      - name: Open/Update PR with drift migration
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(db): sync ${{ github.event.inputs.target || 'PREVIEW' }} schema drift"
          commit-message: "chore(db): add migration from ${{ github.event.inputs.target || 'PREVIEW' }} live schema"
          branch: chore/db-remote-drift-${{ github.event.inputs.target || 'PREVIEW' }}
          base: ${{ steps.makeurl.outputs.BASE_BRANCH }}
          add-paths: supabase/migrations/**
          body: |
            Generated by `supabase db diff` from ${{ github.event.inputs.target || 'PREVIEW' }}.
            Schemas: public, storage, auth.
