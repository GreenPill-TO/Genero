name: Supabase PR Migration Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "supabase/migrations/**"

jobs:
  validate-target-remote:
    if: github.base_ref == 'dev' || github.base_ref == 'main'
    name: Dry-run against target remote
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      - name: Resolve PR target database
        id: target
        env:
          BASE_REF: ${{ github.base_ref }}
          DEV_DB_URL: ${{ secrets.SUPABASE_DIRECT_CONNECTION_STRING_DEV }}
          DEV_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
          PROD_DB_URL: ${{ secrets.SUPABASE_DIRECT_CONNECTION_STRING_PROD }}
          PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
        run: |
          set -e
          case "$BASE_REF" in
            dev)
              echo "TARGET_ENV=DEV" >> "$GITHUB_OUTPUT"
              echo "TARGET_DB_URL=$DEV_DB_URL" >> "$GITHUB_OUTPUT"
              echo "TARGET_PROJECT_REF=$DEV_PROJECT_REF" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "TARGET_ENV=PROD" >> "$GITHUB_OUTPUT"
              echo "TARGET_DB_URL=$PROD_DB_URL" >> "$GITHUB_OUTPUT"
              echo "TARGET_PROJECT_REF=$PROD_PROJECT_REF" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported PR base branch: $BASE_REF" >&2
              exit 1
              ;;
          esac

      - name: Validate migrations with remote dry-run
        env:
          TARGET_ENV: ${{ steps.target.outputs.TARGET_ENV }}
          TARGET_DB_URL: ${{ steps.target.outputs.TARGET_DB_URL }}
          TARGET_PROJECT_REF: ${{ steps.target.outputs.TARGET_PROJECT_REF }}
        run: |
          set -e
          echo "Validating migrations for ${TARGET_ENV} (project ref ${TARGET_PROJECT_REF})"
          supabase db push --dry-run --db-url "$TARGET_DB_URL"
