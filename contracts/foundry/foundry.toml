[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]
cache_path = "cache"
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_remappings = true
fs_permissions = [
  { access = "read", path = "./deploy-config.json" },
  { access = "read-write", path = "./deployments" }
]

[rpc_endpoints]
celo-mainnet = "${CELO_MAINNET_RPC_URL}"
ethereum-sepolia = "${SEPOLIA_RPC_URL}"
celo-sepolia = "${CELO_SEPOLIA_RPC_URL}"
